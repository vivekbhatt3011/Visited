<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Travel Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <!-- App Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- ── HEADER ──────────────────────────────────────────────────────────── -->
  <div id="header">
    <div id="header-left">
      <span style="font-size:24px">🗺️</span>
      <div>
        <div id="header-title">My Travel Map</div>
        <div id="header-sub">0 pins · 0/0 landmarks</div>
      </div>
    </div>
    <div id="header-right">
      <!-- Search bar -->
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Search any place…" autocomplete="off"
          oninput="onSearchInput()" onkeydown="onSearchKey(event)" />
        <button id="search-btn" onclick="triggerSearch()">🔍</button>
        <div id="search-results" class="hidden"></div>
      </div>
      <button class="hbtn" id="btn-locate" onclick="locateMe()">📍 Locate Me</button>
      <button class="hbtn" onclick="shareMap()">🔗 Share</button>
      <button class="hbtn" id="btn-sidebar" onclick="toggleSidebar()">📋 List</button>
    </div>
  </div>

  <!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
  <div id="main">
    <div style="position:relative; flex:1; overflow:hidden; display:flex;">

      <!-- Map -->
      <div id="map"></div>

      <!-- Geolocation status bar -->
      <div id="geo-bar" class="hidden">
        <div class="geo-spinner"></div>
        <span id="geo-bar-text">Detecting your location…</span>
      </div>

      <!-- Hint -->
      <div id="hint">Click any 🏛️ landmark to mark as visited · Click anywhere to add a custom pin</div>

      <!-- Map layer toggle -->
      <div id="layer-toggle">
        <button class="ltbtn active" id="lt-standard"     onclick="switchLayer('standard')">🗺️ OSM Standard</button>
        <button class="ltbtn"        id="lt-humanitarian" onclick="switchLayer('humanitarian')">🤝 OSM Humanitarian</button>
        <button class="ltbtn"        id="lt-terrain"      onclick="switchLayer('terrain')">🏔️ Topographic</button>
        <button class="ltbtn"        id="lt-smooth"       onclick="switchLayer('smooth')">✨ Smooth</button>
        <button class="ltbtn"        id="lt-satellite"    onclick="switchLayer('satellite')">🛰️ Satellite</button>
      </div>

      <!-- Legend -->
      <div id="legend">
        <div class="leg-title">🏛️ Landmarks</div>
        <div class="leg-row">
          <div class="leg-dot" style="background:#FFD700; box-shadow:0 0 6px #FFD700"></div> Visited (World)
        </div>
        <div class="leg-row">
          <div class="leg-dot" style="background:#ff9f1c; box-shadow:0 0 6px #ff9f1c"></div> Visited (India)
        </div>
        <div class="leg-row">
          <div class="leg-dot" style="border:1.5px solid rgba(250,176,5,.5)"></div> Not visited
        </div>
        <div style="margin-top:8px; color:#e63946; font-weight:700; margin-bottom:5px;">📍 Your Pins</div>
        <div class="leg-row">
          <div class="leg-dot" style="background:#e63946"></div> Custom pin
        </div>
        <div class="leg-row" id="leg-myloc" style="display:none">
          <div class="leg-dot" style="background:#e63946; box-shadow:0 0 6px #e63946; border:2px solid #fff"></div> You are here
        </div>
      </div>

    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="hidden"></div>
  </div>

</div><!-- #app -->

<!-- ── LANDMARK MODAL ──────────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="lm-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeLmModal()">✕</button>
    <div style="font-size:36px; margin-bottom:8px" id="lm-emoji"></div>
    <div class="modal-title" id="lm-name"></div>
    <div style="font-size:12px; color:var(--muted); margin-bottom:14px" id="lm-country"></div>
    <div class="status-badge" id="lm-status"></div>
    <button class="mbtn" id="lm-toggle-btn" onclick="toggleCurrentLandmark()"></button>
  </div>
</div>

<!-- ── ADD PIN MODAL ───────────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="pin-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closePinModal()">✕</button>
    <div class="modal-title">📍 Mark this place</div>
    <textarea id="pin-note" placeholder="Add a note… (optional)" rows="3"></textarea>
    <div class="cat-grid" id="cat-grid"></div>
    <div class="mbtn-row" style="margin-top:10px">
      <button class="mbtn mbtn-primary" onclick="confirmAddPin()">Add Pin</button>
      <button class="mbtn mbtn-ghost"   onclick="closePinModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ── VIEW PIN MODAL ──────────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="view-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeViewModal()">✕</button>
    <div class="modal-title" id="view-title"></div>
    <div style="font-size:11px; color:var(--muted); margin-bottom:10px" id="view-date"></div>
    <div id="view-note"
      style="background:#1e1e2e; border-radius:8px; padding:9px; font-size:12px;
             color:#bbb; margin-bottom:12px; line-height:1.6; font-style:italic; display:none">
    </div>
    <button class="mbtn mbtn-ghost"
      style="border-color:var(--accent); color:var(--accent)"
      onclick="deleteCurrentPin()">🗑️ Remove Pin</button>
  </div>
</div>

<!-- ── TOAST ───────────────────────────────────────────────────────────────── -->
<div id="toast">✓ Copied to clipboard!</div>

<!-- ── SCRIPTS (order matters: data first, then app) ─────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
